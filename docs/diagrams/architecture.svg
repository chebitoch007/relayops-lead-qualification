<svg viewBox="0 0 1500 1110" width="1500" height="1110" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <title>RelayOps — System Architecture</title>
