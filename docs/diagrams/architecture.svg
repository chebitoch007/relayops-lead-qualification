  <text x="750.0" y="38" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#5B8DFF" text-anchor="middle" letter-spacing="1.5px">RELAYOPS — SYSTEM ARCHITECTURE</text>
  <text x="750.0" y="62" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#8B94B0" text-anchor="middle">Lead Qualification &amp; Appointment Booking Automation</text>
