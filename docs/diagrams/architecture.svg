  <rect x="80" y="302" width="420" height="46" rx="6" fill="#161D33" stroke="#232B45" stroke-width="1.5"/>
  <text x="92" y="320" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace" font-size="12.5" font-weight="600" fill="#5B8DFF" text-anchor="start">POST /api/leads</text>
  <text x="92" y="336" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="400" fill="#8B94B0" text-anchor="start">validate → qualify → CRM write → email → n8n</text>
  <rect x="80" y="356" width="420" height="46" rx="6" fill="#161D33" stroke="#232B45" stroke-width="1.5"/>
  <text x="92" y="374" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace" font-size="12.5" font-weight="600" fill="#5B8DFF" text-anchor="start">POST /api/webhooks/n8n</text>
  <text x="92" y="390" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="400" fill="#8B94B0" text-anchor="start">patches CRM bookingStatus from n8n</text>
