  <text x="76" y="138" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">User submits name, company, revenue band, biggest</text>
  <text x="76" y="154" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">challenge, etc. — react-hook-form + zod</text>
