  <text x="756.0" y="550" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#8B94B0" text-anchor="start">No booking link;</text>
  <text x="756.0" y="565" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#8B94B0" text-anchor="start">respectful decline</text>
  <text x="550.0" y="648" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace" font-size="10.5" font-weight="400" fill="#8B94B0" text-anchor="middle" letter-spacing="1px">ALL BRANCHES CONVERGE</text>
