  <text x="550.0" y="36" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#5B8DFF" text-anchor="middle" letter-spacing="1.2px">RELAYOPS — DATA FLOW: ONE LEAD'S JOURNEY</text>
  <text x="550.0" y="58" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#8B94B0" text-anchor="middle">From form submission to a booked (or declined) call</text>
  <rect x="260.0" y="90" width="580" height="78" rx="10" fill="#11172A" stroke="#232B45" stroke-width="1.5"/>
  <rect x="260.0" y="90" width="580" height="4" rx="2" fill="#2F6FF0"/>
  <text x="276.0" y="118" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#F1F4FB" text-anchor="start">1. Form Submit (Client)</text>
  <text x="276.0" y="138" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">Browser → POST /api/leads</text>
  <text x="276.0" y="154" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">react-hook-form values, JSON body</text>
