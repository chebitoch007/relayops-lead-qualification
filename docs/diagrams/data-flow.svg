<svg viewBox="0 0 1100 1678" width="1100" height="1678" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <title>RelayOps — Data Flow: One Lead's Journey</title>
