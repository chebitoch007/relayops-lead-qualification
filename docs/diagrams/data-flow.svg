  <rect x="260.0" y="802" width="580" height="4" rx="2" fill="#5B8DFF"/>
  <text x="276.0" y="830" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#F1F4FB" text-anchor="start">5. Email Sends</text>
  <text x="276.0" y="850" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">Lead email (status-specific) + founder</text>
  <text x="276.0" y="866" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">notification — each in its own try/catch</text>
  <text x="826.0" y="820" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace" font-size="10.5" font-weight="600" fill="#FBBF24" text-anchor="end" letter-spacing="0.8px">NON-BLOCKING</text>
  <path d="M 550.0 880 L 550.0 940" fill="none" stroke="#2F6FF0" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="260.0" y="940" width="580" height="78" rx="10" fill="#11172A" stroke="#232B45" stroke-width="1.5" stroke-dasharray="5,4"/>
  <rect x="260.0" y="940" width="580" height="4" rx="2" fill="#5B8DFF"/>
  <text x="276.0" y="968" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#F1F4FB" text-anchor="start">6. n8n Webhook Fired</text>
  <text x="276.0" y="988" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">POST to N8N_WEBHOOK_URL if configured —</text>
  <text x="276.0" y="1004" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">fire-and-forget, only if set</text>
  <text x="826.0" y="958" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace" font-size="10.5" font-weight="600" fill="#FBBF24" text-anchor="end" letter-spacing="0.8px">NON-BLOCKING</text>
  <path d="M 550.0 1018 L 550.0 1078" fill="none" stroke="#2F6FF0" stroke-width="2" marker-end="url(#arrow-primary)"/>
