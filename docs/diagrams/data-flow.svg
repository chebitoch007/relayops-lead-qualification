  <text x="276.0" y="414" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">Structured-output JSON schema → score (1–10),</text>
  <text x="276.0" y="430" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">status, confidence, recommendedNextStep</text>
  <text x="550.0" y="484" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace" font-size="11" font-weight="400" fill="#8B94B0" text-anchor="middle" letter-spacing="1px">BRANCH ON qualification.status</text>
