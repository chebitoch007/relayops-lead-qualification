  <text x="406.0" y="550" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#8B94B0" text-anchor="start">No booking link;</text>
  <text x="406.0" y="565" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#8B94B0" text-anchor="start">routed to review queue</text>
