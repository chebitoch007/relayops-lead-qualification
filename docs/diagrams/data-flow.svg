  <text x="276.0" y="692" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#F1F4FB" text-anchor="start">4. Google Sheets CRM Write</text>
  <text x="276.0" y="712" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">getCrmAdapter().createRecord() — full lead +</text>
  <text x="276.0" y="728" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">qualification + booking status, one row</text>
