  <rect x="260.0" y="1078" width="580" height="4" rx="2" fill="#34D399"/>
  <text x="276.0" y="1106" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#F1F4FB" text-anchor="start">7. n8n Branches By Status</text>
  <text x="276.0" y="1126" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">Task creation / nurture+review queue / archive —</text>
  <text x="276.0" y="1142" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">see architecture.svg for full branch detail</text>
  <text x="550.0" y="1186" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace" font-size="11.5" font-weight="400" fill="#8B94B0" text-anchor="middle" letter-spacing="0.8px">⋮  DAYS LATER — LEAD ACTUALLY BOOKS OR CANCELS  ⋮</text>
  <path d="M 260.0 1200 L 840.0 1200" stroke="#232B45" stroke-width="1.5" stroke-dasharray="4,6"/>
  <path d="M 550.0 1156 L 550.0 1244" fill="none" stroke="#2F6FF0" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="260.0" y="1244" width="580" height="78" rx="10" fill="#11172A" stroke="#232B45" stroke-width="1.5"/>
  <rect x="260.0" y="1244" width="580" height="4" rx="2" fill="#FBBF24"/>
  <text x="276.0" y="1272" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#F1F4FB" text-anchor="start">8. Calendly Fires Event</text>
  <text x="276.0" y="1292" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">invitee.created / invitee.canceled /</text>
  <text x="276.0" y="1308" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">invitee_no_show.created</text>
  <text x="550.0" y="1366" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace" font-size="10.5" font-weight="400" fill="#8B94B0" text-anchor="middle" letter-spacing="0.6px">TWO PATHS — A REAL DEPLOYMENT USES ONE, NOT BOTH</text>
  <path d="M 550.0 1322 L 320.0 1382" fill="none" stroke="#34D399" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="110.0" y="1382" width="420" height="90" rx="10" fill="#161D33" stroke="#34D399" stroke-width="1.5"/>
  <text x="126.0" y="1408" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace" font-size="13" font-weight="700" fill="#34D399" text-anchor="start">Via n8n</text>
  <text x="126.0" y="1428" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#8B94B0" text-anchor="start">Calendly → n8n trigger → Verify</text>
  <text x="126.0" y="1443" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#8B94B0" text-anchor="start">Calendly Signature → /api/webhooks/n8n</text>
  <path d="M 550.0 1322 L 780.0 1382" fill="none" stroke="#5B8DFF" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="570.0" y="1382" width="420" height="90" rx="10" fill="#161D33" stroke="#5B8DFF" stroke-width="1.5"/>
  <text x="586.0" y="1408" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace" font-size="13" font-weight="700" fill="#5B8DFF" text-anchor="start">Direct</text>
  <text x="586.0" y="1428" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#8B94B0" text-anchor="start">Calendly → /api/webhooks/calendly</text>
  <text x="586.0" y="1443" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#8B94B0" text-anchor="start">(HMAC-verified, no n8n required)</text>
  <path d="M 320.0 1472 L 550.0 1532" fill="none" stroke="#34D399" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <path d="M 780.0 1472 L 550.0 1532" fill="none" stroke="#5B8DFF" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="260.0" y="1532" width="580" height="86" rx="10" fill="#11172A" stroke="#232B45" stroke-width="1.5"/>
  <rect x="260.0" y="1532" width="580" height="4" rx="2" fill="#34D399"/>
  <text x="276.0" y="1560" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#F1F4FB" text-anchor="start">9. CRM Patched</text>
  <text x="276.0" y="1580" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">bookingStatus updated ('booked' | 'cancelled' | 'no_show')</text>
  <text x="276.0" y="1596" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">— 'booked' also flips the lead's overall status</text>
