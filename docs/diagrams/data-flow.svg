  <rect x="260.0" y="228" width="580" height="4" rx="2" fill="#2F6FF0"/>
  <text x="276.0" y="256" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#F1F4FB" text-anchor="start">2. Zod Validation</text>
  <text x="276.0" y="276" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">leadFormSchema — identical schema on client</text>
  <text x="276.0" y="292" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8B94B0" text-anchor="start">and server (lib/validation/lead-schema.ts)</text>
